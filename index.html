<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ergo Pipes Animation v5</title>
<style>
* { box-sizing: border-box; }
:root {
  --grid-size: 40px;
  --grid-color: rgba(0, 0, 0, 1);
  --grid-line-width: 1.35px;
  --grid-hover: #000000;
  --grid-bg: #FCFAF8;
}
body { margin: 0; }
.pipes-wrap {
  width: 100%;
  max-width: 1440px;
  margin: 0 auto;
  aspect-ratio: 1440 / 1024;
  overflow: hidden;
  position: relative;
  isolation: isolate;
}
.grid-overlay {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.grid-zone {
  position: absolute;
  display: grid;
  pointer-events: auto;
  /* Outer frame */
  border-top: var(--grid-line-width) solid var(--grid-color);
  border-left: var(--grid-line-width) solid var(--grid-color);
}
.grid-zone .cell {
  transition: background 120ms ease;
  background: transparent;
  border-right: var(--grid-line-width) solid var(--grid-color);
  border-bottom: var(--grid-line-width) solid var(--grid-color);
}
.grid-zone .cell:hover {
  background: var(--grid-hover);
}
.pipes-wrap > svg {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
}
.pipes-wrap.grid-off .grid-overlay { display: none; }
@keyframes dash-move {
  to { stroke-dashoffset: -8; }
}
path[stroke-dasharray] {
  animation: dash-move 0.6s linear infinite;
}
/* Tweaks panel */
.tweaks-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  width: 280px;
  background: #fff;
  border: 1px solid #111;
  border-radius: 6px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 12px;
  color: #111;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  display: none;
}
.tweaks-panel.open { display: block; }
.tweaks-panel header {
  padding: 10px 12px;
  border-bottom: 1px solid #e5e5e5;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 10px;
}
.tweaks-panel header button {
  border: none;
  background: transparent;
  font-size: 16px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  color: #666;
}
.tweaks-panel .body { padding: 12px; display: flex; flex-direction: column; gap: 14px; }
.tweak-row { display: flex; flex-direction: column; gap: 6px; }
.tweak-row > label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: #444;
}
.tweak-row .val {
  font-variant-numeric: tabular-nums;
  color: #111;
  font-weight: 500;
}
.tweak-row input[type="range"] { width: 100%; }
.tweak-row input[type="color"] {
  width: 100%;
  height: 28px;
  padding: 0;
  border: 1px solid #ddd;
  background: #fff;
  cursor: pointer;
}
.tweak-row .toggle-group { display: flex; gap: 6px; }
.tweak-row .toggle-group button {
  flex: 1;
  padding: 6px 8px;
  border: 1px solid #ddd;
  background: #fff;
  cursor: pointer;
  font-size: 11px;
  border-radius: 3px;
}
.tweak-row .toggle-group button.active {
  background: #111;
  color: #fff;
  border-color: #111;
}
</style>

const pipes = pipeConfigs.map(config => {
  const pathEl = document.createElementNS(SVG_NS, 'path');
  pathEl.setAttribute('d', config.d);
  measureLayer.appendChild(pathEl);
  const totalLength = pathEl.getTotalLength();

  const layer = ballLayers[config.layer];
  const balls = [];
  for (let i = 0; i < config.count; i++) {
    const randomBall = Object.keys(BALLS_DATA)[Math.floor(Math.random() * Object.keys(BALLS_DATA).length)];
    const g = document.createElementNS(SVG_NS, 'g');
    const img = document.createElementNS(SVG_NS, 'image');
    img.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', `${BALLS_DATA[randomBall]}`);
    img.setAttribute('href', `${BALLS_DATA[randomBall]}`);
    img.setAttribute('width', BALL_SIZE);
    img.setAttribute('height', BALL_SIZE);
    img.setAttribute('x', -HALF);
    img.setAttribute('y', -HALF);
    g.appendChild(img);
    layer.appendChild(g);
    balls.push({ el: g, t: i / config.count });
  }

  return { pathEl, totalLength, balls, speed: config.speed };
});

let lastTime = null;

function animate(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const deltaTime = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  for (const pipe of pipes) {
    const dt = pipe.speed / pipe.totalLength * (deltaTime / 1000);
    for (const ball of pipe.balls) {
      ball.t = (ball.t + dt) % 1.0;
      const pos = pipe.pathEl.getPointAtLength(ball.t * pipe.totalLength);
      ball.el.setAttribute('transform', `translate(${pos.x}, ${pos.y})`);
      const opacity = ball.t > 0.93 ? (1 - ball.t) / 0.07 : 1;
      ball.el.style.opacity = opacity;
    }
  }

  requestAnimationFrame(animate);
}

    'sq-h4': {fi:{x:1154,  y:250,   w:15,h:15,tr:'rotate(90 1154 250)'},   ou:{x:1154.5,y:250.5,w:14,h:14,tr:'rotate(90 1154.5 250.5)'}},
    'sq-h5': {fi:{x:1121,  y:250,   w:15,h:15,tr:'rotate(90 1121 250)'},   ou:{x:1120.5,y:250.5,w:14,h:14,tr:'rotate(90 1120.5 250.5)'}},
    'sq-h6': {fi:{x:1088,  y:250,   w:15,h:15,tr:'rotate(90 1088 250)'},   ou:{x:1087.5,y:250.5,w:14,h:14,tr:'rotate(90 1087.5 250.5)'}}
  };

  var vIds = ['sq-v1','sq-v2','sq-v3','sq-v4','sq-v5','sq-v6'];
  var hIds = ['sq-h1','sq-h2','sq-h3','sq-h4','sq-h5','sq-h6'];

  var vLevel = 4;
  var hLevel = 4;

  function setState(id, filled) {
    var el = document.getElementById(id);
    if (!el) return;
    var d = data[id][filled ? 'fi' : 'ou'];
    el.setAttribute('x', d.x);
    el.setAttribute('y', d.y);
    el.setAttribute('width', d.w);
    el.setAttribute('height', d.h);
    if (d.tr) el.setAttribute('transform', d.tr);
    if (filled) {
      el.setAttribute('fill', 'black');
      el.removeAttribute('stroke');
    } else {
      el.setAttribute('fill', 'none');
      el.setAttribute('stroke', 'black');
    }
  }

  function applyLevel(ids, level) {
    ids.forEach(function(id, i) { setState(id, i < level); });
  }

  function randomStep(level, min, max) {
    // slight pull toward center so it stays in a natural range
    var mid = (min + max) / 2;
    var goUp = Math.random() < (level < mid ? 0.6 : 0.4);
    var delta = goUp ? 1 : -1;
    return Math.min(max, Math.max(min, level + delta));
  }

  applyLevel(vIds, vLevel);
  applyLevel(hIds, hLevel);

  setInterval(function() {
    vLevel = randomStep(vLevel, 1, 6);
    applyLevel(vIds, vLevel);
  }, 1800);

  setInterval(function() {
    hLevel = randomStep(hLevel, 1, 6);
    applyLevel(hIds, hLevel);
  }, 2400);
})();
</script>

    const g = parseInt(h.slice(2,4), 16);
    const b = parseInt(h.slice(4,6), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  function responsiveLineWidth() {
    const w = window.innerWidth;
    const v = TWEAKS.lineWidth;
    if (w <= 640)  return Math.min(v, 0.35);
    if (w <= 1024) return Math.min(v, 0.6);
    return v;
  }

  function applyTweaks() {
    root.style.setProperty('--grid-hover', TWEAKS.hoverColor);
    root.style.setProperty('--grid-bg', TWEAKS.bgColor);
    root.style.setProperty('--grid-color', hexToRgba(TWEAKS.lineColor, TWEAKS.lineOpacity));
    root.style.setProperty('--grid-line-width', responsiveLineWidth() + 'px');
    wrap.classList.toggle('grid-off', !TWEAKS.gridOn);

    document.getElementById('hoverColor').value = TWEAKS.hoverColor;
    document.getElementById('lineColor').value = TWEAKS.lineColor;
    document.getElementById('lineOpacity').value = TWEAKS.lineOpacity;
    document.getElementById('lineOpacityVal').textContent = TWEAKS.lineOpacity.toFixed(2);
    document.getElementById('lineWidth').value = TWEAKS.lineWidth;
    document.getElementById('lineWidthVal').textContent = TWEAKS.lineWidth.toFixed(2) + 'px';
    document.getElementById('bgColor').value = TWEAKS.bgColor;
    document.getElementById('gridToggleVal').textContent = TWEAKS.gridOn ? 'on' : 'off';
    document.querySelectorAll('#gridToggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.val === (TWEAKS.gridOn ? 'on' : 'off'));
    });
  }

  function persist(edits) {
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: edits }, '*'); } catch (e) {}
  }

  document.getElementById('hoverColor').addEventListener('input', e => {
    TWEAKS.hoverColor = e.target.value; applyTweaks(); persist({ hoverColor: TWEAKS.hoverColor });
  });
  document.getElementById('lineColor').addEventListener('input', e => {
    TWEAKS.lineColor = e.target.value; applyTweaks(); persist({ lineColor: TWEAKS.lineColor });
  });
  document.getElementById('lineOpacity').addEventListener('input', e => {
    TWEAKS.lineOpacity = parseFloat(e.target.value); applyTweaks(); persist({ lineOpacity: TWEAKS.lineOpacity });
  });
  document.getElementById('lineWidth').addEventListener('input', e => {
    TWEAKS.lineWidth = parseFloat(e.target.value); applyTweaks(); persist({ lineWidth: TWEAKS.lineWidth });
  });
  document.getElementById('bgColor').addEventListener('input', e => {
    TWEAKS.bgColor = e.target.value; applyTweaks(); persist({ bgColor: TWEAKS.bgColor });
  });
  document.querySelectorAll('#gridToggle button').forEach(b => {
    b.addEventListener('click', () => {
      TWEAKS.gridOn = b.dataset.val === 'on'; applyTweaks(); persist({ gridOn: TWEAKS.gridOn });
    });
  });

  window.addEventListener('message', (ev) => {
    const d = ev.data; if (!d || typeof d !== 'object') return;
    if (d.type === '__activate_edit_mode') panel.classList.add('open');
    if (d.type === '__deactivate_edit_mode') panel.classList.remove('open');
  });
  document.getElementById('tweaksClose').addEventListener('click', () => {
    panel.classList.remove('open');
    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) {}
  });
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}

  window.addEventListener('resize', applyTweaks);

  buildZones();
  applyTweaks();
})();
</script>
</body>
